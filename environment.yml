name: era5-fwi-sn
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.9
  - numpy=1.22.3
  - pandas=1.4.1
  - scipy=1.8.0
  - xarray=2022.3.0
  - dask=2022.2.1
  - bottleneck=1.3.4
  - netcdf4=1.5.8
  # Geospatial (masking with regionmask + shapefile)
  - geopandas=0.10.2
  - regionmask=0.8.0
  - pyproj=3.3.0
  - shapely=1.8.0
  # Solar noon calculation
  - astral=3.2
  # Config
  - pyyaml=6.0
  # Pip
  - pip
  - pip:
      - cdsapi==0.7.5